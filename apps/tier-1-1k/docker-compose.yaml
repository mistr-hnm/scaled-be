services:
  postgres-t1:
    image: postgres:15
    container_name: postgres-t1
    volumes:
      - ./apps/tier-1-1k/init-db:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    networks:
      - app-network
    ports:
      - "5433:5432"
  
  tier-1-1k:
    build:
      context: ../../
      dockerfile: apps/tier-1-1k/Dockerfile
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - DB_NAME=postgres
      - DB_PORT=5432
    networks:
      - app-network
    depends_on:
      - postgres-t1

networks:
  app-network:
    driver: bridge